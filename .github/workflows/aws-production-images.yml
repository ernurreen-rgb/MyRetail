name: AWS production images

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production-images
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Require the protected production configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AWS_REGION:-}"
          test -n "${AWS_ROLE_ARN:-}"
      - name: Configure temporary AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: myretail-images-${{ github.run_id }}
      - name: Authenticate Docker to ECR
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${registry}"
          echo "registry=${registry}" >> "${GITHUB_OUTPUT}"
      - name: Build and push immutable release images
        env:
          REGISTRY: ${{ steps.registry.outputs.registry }}
        shell: bash
        run: |
          set -euo pipefail
          docker buildx create --name myretail-production --driver docker-container --use

          publish() {
            repository="$1"
            dockerfile="$2"
            target="$3"
            tag="${REGISTRY}/myretail-production/${repository}:${GITHUB_SHA}"
            existing="$(
              aws ecr describe-images \
                --repository-name "myretail-production/${repository}" \
                --image-ids imageTag="${GITHUB_SHA}" \
                --query 'imageDetails[0].imageDigest' \
                --output text 2>/dev/null || true
            )"
            if [[ "${existing}" == sha256:* ]]; then
              return
            fi
            arguments=(
              --file "${dockerfile}"
              --platform linux/amd64
              --provenance=true
              --sbom=true
              --build-arg "OCI_REVISION=${GITHUB_SHA}"
              --tag "${tag}"
              --push
            )
            if [[ -n "${target}" ]]; then
              arguments+=(--target "${target}")
            fi
            docker buildx build "${arguments[@]}" .
          }

          publish api services/api/Dockerfile api
          publish migration services/api/Dockerfile migration
          publish database-bootstrap infra/aws/database-bootstrap/Dockerfile ""
          publish web apps/web/Dockerfile ""
      - name: Capture immutable image evidence
        env:
          REGISTRY: ${{ steps.registry.outputs.registry }}
        shell: bash
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/production-images.json"
          jq --null-input \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg api "${REGISTRY}/myretail-production/api@$(aws ecr describe-images --repository-name myretail-production/api --image-ids imageTag=${GITHUB_SHA} --query 'imageDetails[0].imageDigest' --output text)" \
            --arg migration "${REGISTRY}/myretail-production/migration@$(aws ecr describe-images --repository-name myretail-production/migration --image-ids imageTag=${GITHUB_SHA} --query 'imageDetails[0].imageDigest' --output text)" \
            --arg database_bootstrap "${REGISTRY}/myretail-production/database-bootstrap@$(aws ecr describe-images --repository-name myretail-production/database-bootstrap --image-ids imageTag=${GITHUB_SHA} --query 'imageDetails[0].imageDigest' --output text)" \
            --arg web "${REGISTRY}/myretail-production/web@$(aws ecr describe-images --repository-name myretail-production/web --image-ids imageTag=${GITHUB_SHA} --query 'imageDetails[0].imageDigest' --output text)" \
            '{
              commit_sha: $commit_sha,
              images: {
                api: $api,
                database_bootstrap: $database_bootstrap,
                migration: $migration,
                web: $web
              }
            }' > "${output}"
          cp "${output}" production-images.json
          {
            echo '### Immutable production images'
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo
            jq -r '.images | to_entries[] | "- `\(.key)`: `\(.value)`"' "${output}"
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload image evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-images-${{ github.sha }}
          path: production-images.json
          if-no-files-found: error
          retention-days: 90

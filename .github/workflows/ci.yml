name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "${archive_path}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${archive_path}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive_path}" --directory "${RUNNER_TEMP}" gitleaks
          chmod 0755 "${RUNNER_TEMP}/gitleaks"
      - name: Scan committed secrets
        run: >-
          "${RUNNER_TEMP}/gitleaks" git .
          --config .gitleaks.toml
          --redact=100
          --no-banner
          --log-opts="--all"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/requirements-dev.lock
      - name: Install hash-locked Python dependencies
        run: >-
          python -m pip install
          --disable-pip-version-check
          --require-hashes
          -r services/api/requirements-dev.lock
      - name: Install MyRetail API without dependency resolution
        run: >-
          python -m pip install
          --disable-pip-version-check
          --no-deps
          --no-build-isolation
          -e services/api
      - name: Verify Python lock and SBOM drift
        run: python services/api/scripts/supply_chain.py --check
      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: services/api/requirements.lock
          no-deps: true
          require-hashes: true
      - name: Scan Python code
        run: python -m bandit -r services/api/src services/api/scripts
      - run: python -m ruff check services/api
      - run: python -m pytest services/api/tests

  postgresql-foundation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4@sha256:bb9940981eeb86356ec91bda430f8e0ba8729cc0b319615a2c2d7ac932fdf7bb
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/requirements-dev.lock
      - name: Install hash-locked Python dependencies
        run: >-
          python -m pip install
          --disable-pip-version-check
          --require-hashes
          -r services/api/requirements-dev.lock
      - name: Install MyRetail API without dependency resolution
        run: >-
          python -m pip install
          --disable-pip-version-check
          --no-deps
          --no-build-isolation
          -e services/api
      - name: Bootstrap disposable PostgreSQL roles and databases
        env:
          POSTGRES_CONTAINER_ID: ${{ job.services.postgres.id }}
        run: >-
          docker exec -i "${POSTGRES_CONTAINER_ID}"
          psql -U postgres -d postgres
          < services/api/tests/postgresql/bootstrap_roles.sql
      - name: Apply package-owned migration and verify current head
        env:
          MYRETAIL_STATE_MIGRATION_DATABASE_URL: postgresql+asyncpg://myretail_state_migrator@127.0.0.1:5432/myretail_state_test
        run: |
          myretail-state-migrate upgrade head
          test "$(myretail-state-migrate current)" = "20260716_01 (head)"
      - name: Verify migrations ship inside the wheel
        run: |
          python -m pip wheel --no-deps --no-build-isolation services/api --wheel-dir dist
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("myretail_api-*.whl"))
          with ZipFile(wheel) as archive:
              files = set(archive.namelist())
          required = {
              "myretail_api/migrations/env.py",
              "myretail_api/migrations/script.py.mako",
              "myretail_api/migrations/versions/v20260716_01_state_foundation.py",
          }
          missing = required - files
          if missing:
              raise SystemExit(f"Migration artifact is incomplete: {sorted(missing)}")
          PY
      - name: Run PostgreSQL foundation acceptance
        env:
          MYRETAIL_TEST_POSTGRES_APP_URL: postgresql+asyncpg://myretail_api@127.0.0.1:5432/myretail_state_test
          MYRETAIL_TEST_POSTGRES_ADMIN_URL: postgresql://postgres@127.0.0.1:5432/myretail_state_test
          MYRETAIL_TEST_POSTGRES_UNMIGRATED_APP_URL: postgresql+asyncpg://myretail_api@127.0.0.1:5432/myretail_state_unmigrated_test
          MYRETAIL_TEST_POSTGRES_UNMIGRATED_ADMIN_URL: postgresql://postgres@127.0.0.1:5432/myretail_state_unmigrated_test
        run: >-
          python -m pytest
          services/api/tests/test_postgresql_foundation.py
          services/api/tests/test_idempotency_repository.py
          services/api/tests/test_pos_coordination_repository.py
          services/api/tests/test_pos_projection_repository.py
          services/api/tests/test_stock.py

name: AWS production Terraform

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Create a reviewed plan or apply that exact plan
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
      traffic_enabled:
        description: Enable live traffic only after the full Phase 6B.3 evidence gate
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production
  cancel-in-progress: false

jobs:
  terraform:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      TERRAFORM_VERSION: 1.15.8
      TERRAFORM_LINUX_AMD64_SHA256: d25ce7b6902013ad905db3d2eab0be4cd905887fe88b81a6171b8d5503c31f3d
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KMS_KEY_ARN: ${{ vars.TF_STATE_KMS_KEY_ARN }}
      AVAILABILITY_ZONES_JSON: ${{ vars.AVAILABILITY_ZONES_JSON }}
      TENANT_ID: ${{ vars.TENANT_ID }}
      TENANT_SLUG: ${{ vars.TENANT_SLUG }}
      WEB_DOMAIN_NAME: ${{ vars.WEB_DOMAIN_NAME }}
      ROUTE53_ZONE_ID: ${{ vars.ROUTE53_ZONE_ID }}
      CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}
      ERPNEXT_BASE_URL: ${{ vars.ERPNEXT_BASE_URL }}
      ERPNEXT_COMPANY: ${{ vars.ERPNEXT_COMPANY }}
      ERPNEXT_API_USER: ${{ vars.ERPNEXT_API_USER }}
      ERPNEXT_POS_USER: ${{ vars.ERPNEXT_POS_USER }}
      API_IMAGE: ${{ vars.API_IMAGE }}
      DATABASE_BOOTSTRAP_IMAGE: ${{ vars.DATABASE_BOOTSTRAP_IMAGE }}
      MIGRATION_IMAGE: ${{ vars.MIGRATION_IMAGE }}
      WEB_IMAGE: ${{ vars.WEB_IMAGE }}
      ALARM_EMAIL: ${{ vars.ALARM_EMAIL }}
      MONITORING_ENABLED: ${{ vars.MONITORING_ENABLED }}
      AUTH_ROTATION_LAMBDA_ARN: ${{ vars.AUTH_ROTATION_LAMBDA_ARN }}
      STATE_APP_ROTATION_LAMBDA_ARN: ${{ vars.STATE_APP_ROTATION_LAMBDA_ARN }}
      STATE_MIGRATION_ROTATION_LAMBDA_ARN: ${{ vars.STATE_MIGRATION_ROTATION_LAMBDA_ARN }}
      ERPNEXT_ROTATION_LAMBDA_ARN: ${{ vars.ERPNEXT_ROTATION_LAMBDA_ARN }}
      TRAFFIC_APPROVAL_URL: ${{ vars.TRAFFIC_APPROVAL_URL }}
      PRODUCTION_EVIDENCE_MANIFEST_B64: ${{ secrets.PRODUCTION_EVIDENCE_MANIFEST_B64 }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Require the protected production configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AWS_REGION AWS_ROLE_ARN TF_STATE_BUCKET TF_STATE_KMS_KEY_ARN
            AVAILABILITY_ZONES_JSON TENANT_ID TENANT_SLUG WEB_DOMAIN_NAME
            ROUTE53_ZONE_ID CERTIFICATE_ARN ERPNEXT_BASE_URL ERPNEXT_COMPANY
            ERPNEXT_API_USER ERPNEXT_POS_USER
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing protected production variable: ${name}" >&2
              exit 2
            fi
          done
          if [[ "${{ inputs.operation }}" == "apply" && "${GITHUB_ACTOR}" == "github-actions[bot]" ]]; then
            echo "Production apply requires a human actor" >&2
            exit 2
          fi
      - name: Configure temporary AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: myretail-${{ github.run_id }}
      - name: Install checksum-pinned Terraform
        shell: bash
        run: |
          set -euo pipefail
          archive="terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          archive_path="${RUNNER_TEMP}/${archive}"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/${archive}" \
            --output "${archive_path}"
          printf '%s  %s\n' "${TERRAFORM_LINUX_AMD64_SHA256}" "${archive_path}" \
            | sha256sum --check --strict
          unzip -q "${archive_path}" -d "${RUNNER_TEMP}/terraform"
          echo "${RUNNER_TEMP}/terraform" >> "${GITHUB_PATH}"
      - name: Validate cutover evidence and create non-secret variable file
        id: inputs
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          monitoring_enabled="${MONITORING_ENABLED:-false}"
          if [[ "${monitoring_enabled}" != "true" && "${monitoring_enabled}" != "false" ]]; then
            echo "MONITORING_ENABLED must be true or false" >&2
            exit 2
          fi
          zero_digest="$(printf '0%.0s' {1..64})"
          repository_prefix="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/myretail-production"
          resolve_image() {
            configured="$1"
            repository="$2"
            if [[ -n "${configured}" ]]; then
              printf '%s' "${configured}"
              return
            fi
            digest="$(
              aws ecr describe-images \
                --repository-name "myretail-production/${repository}" \
                --image-ids imageTag="${GITHUB_SHA}" \
                --query 'imageDetails[0].imageDigest' \
                --output text 2>/dev/null || true
            )"
            if [[ "${digest}" == sha256:* ]]; then
              printf '%s/%s@%s' "${repository_prefix}" "${repository}" "${digest}"
            else
              printf '%s/%s@sha256:%s' "${repository_prefix}" "${repository}" "${zero_digest}"
            fi
          }
          api_image="$(resolve_image "${API_IMAGE:-}" api)"
          database_bootstrap_image="$(resolve_image "${DATABASE_BOOTSTRAP_IMAGE:-}" database-bootstrap)"
          migration_image="$(resolve_image "${MIGRATION_IMAGE:-}" migration)"
          web_image="$(resolve_image "${WEB_IMAGE:-}" web)"

          evidence_sha=""
          if [[ "${{ inputs.traffic_enabled }}" == "true" ]]; then
            required_cutover=(
              AUTH_ROTATION_LAMBDA_ARN STATE_APP_ROTATION_LAMBDA_ARN
              STATE_MIGRATION_ROTATION_LAMBDA_ARN ERPNEXT_ROTATION_LAMBDA_ARN
              TRAFFIC_APPROVAL_URL PRODUCTION_EVIDENCE_MANIFEST_B64
            )
            for name in "${required_cutover[@]}"; do
              if [[ -z "${!name:-}" ]]; then
                echo "Traffic gate is missing: ${name}" >&2
                exit 2
              fi
            done
            if [[ "${monitoring_enabled}" != "true" ]]; then
              echo "Traffic requires MONITORING_ENABLED=true" >&2
              exit 2
            fi
            for image in \
              "${api_image}" \
              "${database_bootstrap_image}" \
              "${migration_image}" \
              "${web_image}"
            do
              if [[ "${image}" == *@sha256:"${zero_digest}" ]]; then
                echo "Traffic requires images published for the workflow commit" >&2
                exit 2
              fi
            done
            evidence_path="${RUNNER_TEMP}/production-evidence.json"
            printf '%s' "${PRODUCTION_EVIDENCE_MANIFEST_B64}" | base64 --decode > "${evidence_path}"
            python services/api/scripts/validate_production_evidence.py "${evidence_path}"
            python - \
              "${evidence_path}" \
              "${GITHUB_SHA}" \
              "${api_image##*@}" \
              "${migration_image##*@}" <<'PY'
          import json
          import sys

          path, expected_sha, api_digest, migration_digest = sys.argv[1:]
          with open(path, encoding="utf-8") as stream:
              manifest = json.load(stream)
          if manifest["release"]["commit_sha"] != expected_sha:
              raise SystemExit("Evidence release commit does not match the workflow commit")
          if manifest["release"]["api_image_digest"] != api_digest:
              raise SystemExit("Evidence API digest does not match the deployed image")
          if manifest["release"]["migration_image_digest"] != migration_digest:
              raise SystemExit("Evidence migration digest does not match the deployed image")
          PY
            evidence_sha="$(sha256sum "${evidence_path}" | cut -d' ' -f1)"
            rm -f "${evidence_path}"
          fi

          jq --null-input \
            --arg aws_region "${AWS_REGION}" \
            --argjson availability_zones "${AVAILABILITY_ZONES_JSON}" \
            --arg tenant_id "${TENANT_ID}" \
            --arg tenant_slug "${TENANT_SLUG}" \
            --arg web_domain_name "${WEB_DOMAIN_NAME}" \
            --arg route53_zone_id "${ROUTE53_ZONE_ID}" \
            --arg certificate_arn "${CERTIFICATE_ARN}" \
            --arg erpnext_base_url "${ERPNEXT_BASE_URL}" \
            --arg erpnext_company "${ERPNEXT_COMPANY}" \
            --arg erpnext_api_user "${ERPNEXT_API_USER}" \
            --arg erpnext_pos_user "${ERPNEXT_POS_USER}" \
            --arg api_image "${api_image}" \
            --arg database_bootstrap_image "${database_bootstrap_image}" \
            --arg migration_image "${migration_image}" \
            --arg web_image "${web_image}" \
            --arg alarm_email "${ALARM_EMAIL:-}" \
            --argjson monitoring_enabled "${monitoring_enabled}" \
            --arg auth_rotation_lambda_arn "${AUTH_ROTATION_LAMBDA_ARN:-}" \
            --arg state_app_rotation_lambda_arn "${STATE_APP_ROTATION_LAMBDA_ARN:-}" \
            --arg state_migration_rotation_lambda_arn "${STATE_MIGRATION_ROTATION_LAMBDA_ARN:-}" \
            --arg erpnext_rotation_lambda_arn "${ERPNEXT_ROTATION_LAMBDA_ARN:-}" \
            --arg evidence_sha "${evidence_sha}" \
            --arg traffic_approval_url "${TRAFFIC_APPROVAL_URL:-}" \
            --argjson traffic_enabled "${{ inputs.traffic_enabled }}" \
            '{
              aws_region: $aws_region,
              availability_zones: $availability_zones,
              tenant_id: $tenant_id,
              tenant_slug: $tenant_slug,
              web_domain_name: $web_domain_name,
              route53_zone_id: $route53_zone_id,
              certificate_arn: $certificate_arn,
              erpnext_base_url: $erpnext_base_url,
              erpnext_company: $erpnext_company,
              erpnext_api_user: $erpnext_api_user,
              erpnext_pos_user: $erpnext_pos_user,
              api_image: $api_image,
              database_bootstrap_image: $database_bootstrap_image,
              migration_image: $migration_image,
              web_image: $web_image,
              monitoring_enabled: $monitoring_enabled,
              traffic_enabled: $traffic_enabled
            }
            + (if $alarm_email == "" then {} else {alarm_email: $alarm_email} end)
            + (if $auth_rotation_lambda_arn == "" then {} else {auth_rotation_lambda_arn: $auth_rotation_lambda_arn} end)
            + (if $state_app_rotation_lambda_arn == "" then {} else {state_app_rotation_lambda_arn: $state_app_rotation_lambda_arn} end)
            + (if $state_migration_rotation_lambda_arn == "" then {} else {state_migration_rotation_lambda_arn: $state_migration_rotation_lambda_arn} end)
            + (if $erpnext_rotation_lambda_arn == "" then {} else {erpnext_rotation_lambda_arn: $erpnext_rotation_lambda_arn} end)
            + (if $evidence_sha == "" then {} else {production_evidence_manifest_sha256: $evidence_sha} end)
            + (if $traffic_approval_url == "" then {} else {traffic_approval_url: $traffic_approval_url} end)' \
            > "${RUNNER_TEMP}/production.auto.tfvars.json"
          echo "var_file=${RUNNER_TEMP}/production.auto.tfvars.json" >> "${GITHUB_OUTPUT}"
      - name: Initialize and validate production root
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=infra/aws/production init \
            -input=false \
            -lockfile=readonly \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=myretail/production/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${TF_STATE_KMS_KEY_ARN}" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infra/aws/production validate -no-color
      - name: Create production plan
        shell: bash
        run: >-
          terraform -chdir=infra/aws/production plan
          -input=false
          -lock-timeout=5m
          -var-file="${{ steps.inputs.outputs.var_file }}"
          -out="${RUNNER_TEMP}/production.tfplan"
      - name: Apply the reviewed plan
        if: inputs.operation == 'apply'
        shell: bash
        run: >-
          terraform -chdir=infra/aws/production apply
          -input=false
          -lock-timeout=5m
          -auto-approve
          "${RUNNER_TEMP}/production.tfplan"
      - name: Remove ephemeral evidence and plan files
        if: always()
        shell: bash
        run: |
          rm -f \
            "${RUNNER_TEMP}/production-evidence.json" \
            "${RUNNER_TEMP}/production.auto.tfvars.json" \
            "${RUNNER_TEMP}/production.tfplan"

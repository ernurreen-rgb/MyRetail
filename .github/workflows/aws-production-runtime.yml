name: AWS production runtime bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      TERRAFORM_VERSION: 1.15.8
      TERRAFORM_LINUX_AMD64_SHA256: d25ce7b6902013ad905db3d2eab0be4cd905887fe88b81a6171b8d5503c31f3d
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KMS_KEY_ARN: ${{ vars.TF_STATE_KMS_KEY_ARN }}
      ERPNEXT_API_KEY: ${{ secrets.ERPNEXT_API_KEY }}
      ERPNEXT_API_SECRET: ${{ secrets.ERPNEXT_API_SECRET }}
      ERPNEXT_POS_USER_MAP_JSON: ${{ secrets.ERPNEXT_POS_USER_MAP_JSON }}
      ERPNEXT_POS_CREDENTIALS_MAP_JSON: ${{ secrets.ERPNEXT_POS_CREDENTIALS_MAP_JSON }}
      POS_CASHIER_ASSIGNMENTS_JSON: ${{ secrets.POS_CASHIER_ASSIGNMENTS_JSON }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Require protected runtime inputs
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AWS_REGION AWS_ROLE_ARN TF_STATE_BUCKET TF_STATE_KMS_KEY_ARN
            ERPNEXT_API_KEY ERPNEXT_API_SECRET ERPNEXT_POS_USER_MAP_JSON
            ERPNEXT_POS_CREDENTIALS_MAP_JSON POS_CASHIER_ASSIGNMENTS_JSON
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing protected runtime input: ${name}" >&2
              exit 2
            fi
          done
          jq --exit-status 'type == "object"' <<<"${ERPNEXT_POS_USER_MAP_JSON}" >/dev/null
          jq --exit-status 'type == "object"' <<<"${ERPNEXT_POS_CREDENTIALS_MAP_JSON}" >/dev/null
          jq --exit-status 'type == "object"' <<<"${POS_CASHIER_ASSIGNMENTS_JSON}" >/dev/null
      - name: Configure temporary AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: myretail-runtime-${{ github.run_id }}
      - name: Install checksum-pinned Terraform
        shell: bash
        run: |
          set -euo pipefail
          archive="terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          archive_path="${RUNNER_TEMP}/${archive}"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/${archive}" \
            --output "${archive_path}"
          printf '%s  %s\n' "${TERRAFORM_LINUX_AMD64_SHA256}" "${archive_path}" \
            | sha256sum --check --strict
          unzip -q "${archive_path}" -d "${RUNNER_TEMP}/terraform"
          echo "${RUNNER_TEMP}/terraform" >> "${GITHUB_PATH}"
      - name: Read non-secret deployment wiring from remote state
        id: state
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=infra/aws/production init \
            -input=false \
            -lockfile=readonly \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=myretail/production/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${TF_STATE_KMS_KEY_ARN}" \
            -backend-config="use_lockfile=true"
          echo "cluster=$(terraform -chdir=infra/aws/production output -raw ecs_cluster_name)" >> "${GITHUB_OUTPUT}"
          echo "security_group=$(terraform -chdir=infra/aws/production output -raw api_security_group_id)" >> "${GITHUB_OUTPUT}"
          echo "database_endpoint=$(terraform -chdir=infra/aws/production output -raw database_endpoint)" >> "${GITHUB_OUTPUT}"
          echo "database_bootstrap_task=$(terraform -chdir=infra/aws/production output -raw database_bootstrap_task_definition_arn)" >> "${GITHUB_OUTPUT}"
          echo "migration_task=$(terraform -chdir=infra/aws/production output -raw migration_task_definition_arn)" >> "${GITHUB_OUTPUT}"
          echo "preflight_task=$(terraform -chdir=infra/aws/production output -raw preflight_task_definition_arn)" >> "${GITHUB_OUTPUT}"
          echo "monitor_task=$(terraform -chdir=infra/aws/production output -raw monitor_task_definition_arn)" >> "${GITHUB_OUTPUT}"
          terraform -chdir=infra/aws/production output -json app_subnet_ids \
            | jq --compact-output . > "${RUNNER_TEMP}/app-subnets.json"
          terraform -chdir=infra/aws/production output -json runtime_secret_arns \
            | jq --compact-output . > "${RUNNER_TEMP}/runtime-secrets.json"
      - name: Refuse placeholder task images
        env:
          DATABASE_BOOTSTRAP_TASK: ${{ steps.state.outputs.database_bootstrap_task }}
          MIGRATION_TASK: ${{ steps.state.outputs.migration_task }}
          PREFLIGHT_TASK: ${{ steps.state.outputs.preflight_task }}
          MONITOR_TASK: ${{ steps.state.outputs.monitor_task }}
        shell: bash
        run: |
          set -euo pipefail
          zero_digest="$(printf '0%.0s' {1..64})"
          for task in \
            "${DATABASE_BOOTSTRAP_TASK}" \
            "${MIGRATION_TASK}" \
            "${PREFLIGHT_TASK}" \
            "${MONITOR_TASK}"
          do
            image="$(aws ecs describe-task-definition \
              --task-definition "${task}" \
              --query 'taskDefinition.containerDefinitions[0].image' \
              --output text)"
            if [[ "${image}" == *@sha256:"${zero_digest}" ]]; then
              echo "Runtime task still references a placeholder image" >&2
              exit 2
            fi
          done
      - name: Initialize missing runtime secret versions
        env:
          DATABASE_ENDPOINT: ${{ steps.state.outputs.database_endpoint }}
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f "${RUNNER_TEMP}"/myretail-secret-*.json' EXIT

          secret_arn() {
            jq --raw-output --arg key "$1" '.[$key]' "${RUNNER_TEMP}/runtime-secrets.json"
          }
          has_current() {
            version="$(aws secretsmanager list-secret-version-ids \
              --secret-id "$1" \
              --include-deprecated \
              --query "Versions[?contains(VersionStages, 'AWSCURRENT')].VersionId | [0]" \
              --output text)"
            [[ "${version}" != "None" && -n "${version}" ]]
          }
          put_file() {
            aws secretsmanager put-secret-value \
              --secret-id "$1" \
              --secret-string "file://$2" >/dev/null
          }

          auth_arn="$(secret_arn auth)"
          app_arn="$(secret_arn state_app)"
          migration_arn="$(secret_arn state_migration)"
          erpnext_arn="$(secret_arn erpnext)"

          if ! has_current "${auth_arn}"; then
            jq --null-input \
              --arg auth_secret "$(openssl rand -base64 48)" \
              --arg auth_rate_limit_secret "$(openssl rand -base64 48)" \
              '{auth_secret: $auth_secret, auth_rate_limit_secret: $auth_rate_limit_secret}' \
              > "${RUNNER_TEMP}/myretail-secret-auth.json"
            put_file "${auth_arn}" "${RUNNER_TEMP}/myretail-secret-auth.json"
          fi

          app_has=false
          migration_has=false
          has_current "${app_arn}" && app_has=true
          has_current "${migration_arn}" && migration_has=true
          if [[ "${app_has}" != "${migration_has}" ]]; then
            echo "Database secrets are partially initialized; use the rotation/remediation runbook" >&2
            exit 2
          fi
          if [[ "${app_has}" == "false" ]]; then
            app_password="$(openssl rand -hex 32)"
            migration_password="$(openssl rand -hex 32)"
            jq --null-input \
              --arg password "${app_password}" \
              --arg database_url "postgresql+asyncpg://myretail_api:${app_password}@${DATABASE_ENDPOINT}:5432/myretail_state" \
              '{password: $password, database_url: $database_url}' \
              > "${RUNNER_TEMP}/myretail-secret-state-app.json"
            jq --null-input \
              --arg password "${migration_password}" \
              --arg database_url "postgresql+asyncpg://myretail_state_migrator:${migration_password}@${DATABASE_ENDPOINT}:5432/myretail_state" \
              '{password: $password, database_url: $database_url}' \
              > "${RUNNER_TEMP}/myretail-secret-state-migration.json"
            put_file "${app_arn}" "${RUNNER_TEMP}/myretail-secret-state-app.json"
            put_file "${migration_arn}" "${RUNNER_TEMP}/myretail-secret-state-migration.json"
          fi

          if ! has_current "${erpnext_arn}"; then
            jq --null-input \
              --arg api_key "${ERPNEXT_API_KEY}" \
              --arg api_secret "${ERPNEXT_API_SECRET}" \
              --argjson erpnext_pos_user_map "${ERPNEXT_POS_USER_MAP_JSON}" \
              --argjson erpnext_pos_credentials_map "${ERPNEXT_POS_CREDENTIALS_MAP_JSON}" \
              --argjson pos_cashier_assignments "${POS_CASHIER_ASSIGNMENTS_JSON}" \
              '{
                api_key: $api_key,
                api_secret: $api_secret,
                erpnext_pos_user_map: $erpnext_pos_user_map,
                erpnext_pos_credentials_map: $erpnext_pos_credentials_map,
                pos_cashier_assignments: $pos_cashier_assignments
              }' > "${RUNNER_TEMP}/myretail-secret-erpnext.json"
            put_file "${erpnext_arn}" "${RUNNER_TEMP}/myretail-secret-erpnext.json"
          fi
      - name: Run role bootstrap, migration, preflight and monitor
        env:
          CLUSTER: ${{ steps.state.outputs.cluster }}
          SECURITY_GROUP: ${{ steps.state.outputs.security_group }}
          DATABASE_BOOTSTRAP_TASK: ${{ steps.state.outputs.database_bootstrap_task }}
          MIGRATION_TASK: ${{ steps.state.outputs.migration_task }}
          PREFLIGHT_TASK: ${{ steps.state.outputs.preflight_task }}
          MONITOR_TASK: ${{ steps.state.outputs.monitor_task }}
        shell: bash
        run: |
          set -euo pipefail
          network_configuration="$(jq --null-input --compact-output \
            --argjson subnets "$(cat "${RUNNER_TEMP}/app-subnets.json")" \
            --arg security_group "${SECURITY_GROUP}" \
            '{awsvpcConfiguration: {
              subnets: $subnets,
              securityGroups: [$security_group],
              assignPublicIp: "DISABLED"
            }}')"

          run_task() {
            label="$1"
            task_definition="$2"
            response="$(aws ecs run-task \
              --cluster "${CLUSTER}" \
              --task-definition "${task_definition}" \
              --launch-type FARGATE \
              --platform-version 1.4.0 \
              --network-configuration "${network_configuration}" \
              --count 1)"
            if [[ "$(jq '.failures | length' <<<"${response}")" != "0" ]]; then
              echo "${label} task was rejected by ECS" >&2
              exit 1
            fi
            task_arn="$(jq --raw-output '.tasks[0].taskArn' <<<"${response}")"
            aws ecs wait tasks-stopped --cluster "${CLUSTER}" --tasks "${task_arn}"
            exit_code="$(aws ecs describe-tasks \
              --cluster "${CLUSTER}" \
              --tasks "${task_arn}" \
              --query 'tasks[0].containers[0].exitCode' \
              --output text)"
            if [[ "${exit_code}" != "0" ]]; then
              echo "${label} task failed; inspect its CloudWatch log stream" >&2
              exit 1
            fi
            printf '%s\t%s\n' "${label}" "${task_arn}" >> "${RUNNER_TEMP}/verified-tasks.tsv"
          }

          run_task database-bootstrap "${DATABASE_BOOTSTRAP_TASK}"
          run_task migration "${MIGRATION_TASK}"
          run_task preflight "${PREFLIGHT_TASK}"
          run_task monitor "${MONITOR_TASK}"

          {
            echo '### Production runtime verification'
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo
            while IFS=$'\t' read -r label task_arn; do
              echo "- \`${label}\`: \`${task_arn}\`"
            done < "${RUNNER_TEMP}/verified-tasks.tsv"
            echo
            echo 'Next gate: set `MONITORING_ENABLED=true`, apply the Terraform plan, then collect alert, restore and smoke evidence.'
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Remove ephemeral files
        if: always()
        shell: bash
        run: |
          rm -f \
            "${RUNNER_TEMP}/app-subnets.json" \
            "${RUNNER_TEMP}/runtime-secrets.json" \
            "${RUNNER_TEMP}/verified-tasks.tsv" \
            "${RUNNER_TEMP}"/myretail-secret-*.json
